<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to ExpensePro - Smart Expense Reimbursement System" />
  <title>Login — ExpensePro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  {% load static %}
  <link rel="stylesheet" href="{% static 'style.css' %}" />
  <!-- Prevent flash of wrong theme -->
  <script>
    if (localStorage.getItem('epTheme') === 'dark') {
      document.documentElement.classList.add('dark-mode');
    }
  </script>
</head>
<body class="auth-body">
  <!-- Animated background orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="auth-container">
    <!-- Theme toggle row on login -->
    <div class="auth-theme-row" style="margin-bottom:12px;">
      <button class="theme-toggle theme-toggle-btn" type="button" title="Switch theme">
        <i class="toggle-icon fa-solid fa-moon"></i>
        <div class="toggle-track"></div>
      </button>
    </div>

    <div class="auth-card">
      <!-- Brand -->
      <div class="auth-brand">
        <div class="logo-icon lg">
          <i class="fa-solid fa-receipt"></i>
        </div>
        <h1 class="auth-title">Expense<strong>Pro</strong></h1>
        <p class="auth-subtitle">Smart Reimbursement Management</p>
      </div>

      <!-- Form -->
      <form class="auth-form" method="POST" action="{% url 'login' %}" id="login-form" autocomplete="off">
        {% csrf_token %}

        {% if messages %}
          {% for message in messages %}
            <div class="form-error-banner" style="{% if message.tags == 'success' %}background: rgba(46, 204, 113, 0.1); color: #2ecc71; border-color: rgba(46, 204, 113, 0.3);{% endif %}">
              <i class="{% if message.tags == 'success' %}fa-solid fa-check-circle{% else %}fa-solid fa-triangle-exclamation{% endif %}"></i>
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}

        <div class="form-group">
          <label class="form-label" for="id_username">
            <i class="fa-solid fa-user"></i> Username
          </label>
          <input
            type="text"
            id="id_username"
            name="username"
            class="form-input"
            placeholder="Enter your username"
            autocomplete="off"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="id_password">
            <i class="fa-solid fa-lock"></i> Password
          </label>
          <div class="input-wrapper">
            <input
              type="password"
              id="id_password"
              name="password"
              class="form-input"
              placeholder="Enter your password"
              autocomplete="new-password"
              required
            />
            <button type="button" class="toggle-pw" id="toggle-pw" title="Show/hide password">
              <i class="fa-solid fa-eye" id="pw-eye"></i>
            </button>
          </div>
        </div>

        <input type="hidden" name="next" value="{{ next }}" />

        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          <span class="btn-text">Sign In</span>
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>

      <div style="text-align:center; margin-top:var(--sp-lg); font-size:14px;">
        <span style="color:var(--clr-text-muted);">Is your company new here?</span> 
        <a href="{% url 'signup' %}" style="color:var(--clr-primary); font-weight:600;">Sign up as Admin</a>
      </div>

      <p class="auth-footer-text">
        ExpensePro &copy; {% now "Y" %} &mdash; All rights reserved
      </p>
    </div>
  </div>

  <script src="{% static 'script.js' %}"></script>
  <script>
    // Password toggle
    document.getElementById('toggle-pw').addEventListener('click', function() {
      const pw = document.getElementById('id_password');
      const eye = document.getElementById('pw-eye');
      if (pw.type === 'password') {
        pw.type = 'text';
        eye.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        pw.type = 'password';
        eye.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    // Ripple effect on submit
    document.getElementById('login-btn').addEventListener('click', function(e) {
      this.classList.add('loading');
    });
  </script>
</body>
</html>
